version: "3.9"

services:
  frontend:
    build: .
    container_name: inventory-frontend
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://localhost:8080/api
    networks:
      - inventory-net
    restart: unless-stopped

networks:
  inventory-net:
    external: true
    name: inventory-net
